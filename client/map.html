<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #000; }
        #map { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const incidentId = params.get('incident_id');

        let map = null;
        let zones = {};

        async function init() {
            // Get incident location
            const res = await fetch(`/api/incidents/${incidentId}`);
            const inc = await res.json();

            const lat = inc.location_lat || 38.9592;
            const lng = inc.location_lng || -95.2453;

            map = L.map('map').setView([lat, lng], 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19,
                attribution: '&copy; OpenStreetMap &copy; CARTO'
            }).addTo(map);

            // Incident marker
            L.marker([lat, lng]).addTo(map)
                .bindPopup(`<b>${inc.name}</b>`).openPopup();

            await loadZones();

            // Poll for zone updates every 5s
            setInterval(loadZones, 5000);
        }

        async function loadZones() {
            try {
                const res = await fetch(`/api/incidents/${incidentId}/zones`);
                const zoneList = await res.json();

                // Clear existing
                for (const key in zones) map.removeLayer(zones[key]);
                zones = {};

                zoneList.forEach(zone => {
                    const colorMap = {
                        danger: '#e74c3c',
                        hot: '#e74c3c',
                        warm: '#f39c12',
                        cold: '#2ecc71',
                        staging_area: '#9b59b6',
                        landing_zone: '#3498db',
                        blocked_road: '#e67e22',
                    };
                    const color = colorMap[zone.zone_type] || '#3498db';
                    const circle = L.circle([zone.center_lat, zone.center_lng], {
                        color,
                        fillColor: color,
                        fillOpacity: 0.25,
                        radius: zone.radius_meters || 50
                    }).addTo(map);
                    circle.bindPopup(`<b>${zone.label}</b><br>${zone.zone_type}`);
                    zones[zone.id] = circle;
                });
            } catch(e) {
                console.error('Zone load error:', e);
            }
        }

        if (incidentId) init();
    </script>
</body>
</html>
