<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>FirstResponse AI V2</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<!-- DEBUG CONSOLE - remove before final demo -->
<script>
function log(msg) { console.log(msg); }
</script>
<body>
    <div id="dispatch-alert-overlay" class="hidden" style="position:fixed; inset:0; background:#0a0f1a; z-index:900; display:flex; flex-direction:column;">
        <div style="background:#3498db; padding:20px; text-align:center;">
            <h1 style="color:#fff; margin:0; font-size:1.3em; letter-spacing:0.1em;">🚨 YOU HAVE BEEN DISPATCHED</h1>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:24px; text-align:center; gap:8px;">
            <h2 id="dispatch-incident-type" style="color:#fff; margin:0; font-size:1.4em;"></h2>
            <p id="dispatch-address" style="color:#aaa; font-size:1.1em; margin:0;"></p>
            <p id="dispatch-description" style="color:#aaa; margin:0;"></p>
            <p id="dispatch-notes" style="color:#888; font-style:italic; margin:0;"></p>
            <div style="margin-top:24px; margin-bottom:8px;">
                <p style="color:#aaa; margin-bottom:10px; font-size:0.85em; letter-spacing:0.05em;">REPORT TO:</p>
                <div id="dispatch-channel-badge" style="background:#3498db; color:#fff; padding:14px 32px; border-radius:4px; font-size:1.2em; font-weight:700; letter-spacing:0.1em;"></div>
            </div>
            <button id="dispatch-respond-btn" style="margin-top:16px; background:#3498db; color:#fff; border:none; padding:16px 48px; font-size:1.1em; font-weight:700; border-radius:6px; cursor:pointer; letter-spacing:0.05em;">RESPOND</button>
        </div>
    </div>

    <div id="full-screen-alert" class="hidden">
        <div class="alert-content">
            <h1 id="alert-title">CRITICAL ALERT</h1>
            <p id="alert-text"></p>
            <button id="alert-dismiss">DISMISS</button>
        </div>
    </div>

    <!-- SCREEN 1: Registration -->
    <div id="screen-registration" class="screen active">
        <div class="header">
            <h1>Unit Registration</h1>
        </div>
        <div class="content" id="reg-type-select">
            <h2>Select Unit Type</h2>
            <div class="grid-buttons">
                <button data-type="engine">Engine</button>
                <button data-type="ladder">Ladder</button>
                <button data-type="medic">Medic</button>
                <button data-type="battalion_chief">Battalion</button>
                <button data-type="division">Division</button>
                <button data-type="staging">Staging</button>
                <button data-type="command" class="critical-btn">Command</button>
            </div>
        </div>
        <div class="content hidden" id="reg-number-select">
            <h2>Enter Unit Number</h2>
            <input type="text" id="unit-number-input" placeholder="e.g. 7 or A" autocomplete="off" />
            <button id="reg-confirm-btn" class="primary-btn">Confirm</button>
            <button id="reg-back-btn" class="secondary-btn">Back</button>
        </div>
    </div>

    <!-- SCREEN 2: Incident Selection -->
    <div id="screen-incidents" class="screen hidden">
        <div class="header">
            <h1>Active Incidents</h1>
            <span id="reg-callsign-display"></span>
        </div>
        <div class="content">
            <div id="incident-list" class="list-container">
                <!-- Fetch list of incidents from /api/incidents -->
            </div>
            <button id="create-incident-btn" class="primary-btn">Create New Incident</button>
        </div>
        
        <div id="create-incident-modal" class="modal hidden">
            <h3>New Incident</h3>
            <input type="text" id="inc-name" placeholder="Incident Name" />
            <select id="inc-type">
                <option value="structure_fire">Structure Fire</option>
                <option value="mci">MCI</option>
                <option value="hazmat">Hazmat</option>
                <option value="other">Other</option>
            </select>
            <div style="position:relative;">
                <input type="text" id="inc-location-search" placeholder="Search location..." autocomplete="off" style="width:100%;" />
                <div id="inc-location-results" style="display:none; position:absolute; top:100%; left:0; right:0; background:#1a1a1a; border:1px solid #333; border-radius:4px; z-index:100; max-height:200px; overflow-y:auto;"></div>
            </div>
            <div id="inc-location-selected" style="display:none; color:#4caf50; font-size:0.85em; margin-top:4px;"></div>
            <input type="hidden" id="inc-lat" />
            <input type="hidden" id="inc-lng" />
            <input type="hidden" id="inc-location-name" />
            <div class="btn-row">
                <button id="submit-incident-btn" class="primary-btn">Create & Join</button>
                <button id="cancel-incident-btn" class="secondary-btn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- SCREEN 3: Main Interface -->
    <div id="screen-main" class="screen hidden">
        <div class="top-bar">
            <div>
                <span class="callsign" id="main-callsign"></span>
                <span class="connection-status">
                    <span class="status-dot disconnected" id="status-dot"></span>
                </span>
            </div>
            <div class="incident-name" id="main-incident-name"></div>
        </div>

        <!-- TABS CONTENT -->
        <div class="tab-content active" id="tab-cards">
            <div class="channel-grid" id="channel-grid"></div>
        </div>
        <div class="tab-content" id="tab-dashboard">
            <iframe id="dashboard-iframe" src="/dashboard?embed=true"></iframe>
        </div>

        <div class="tab-content" id="tab-map">
            <iframe id="map-iframe" src="" style="width:100%;height:100%;border:none;display:block;"></iframe>
        </div>

        <div class="tab-content" id="tab-dispatch">
            <iframe id="dispatch-iframe" src="/dashboard#dispatch" style="width:100%;height:100%;border:none;"></iframe>
        </div>

        <!-- TICKER & PTT -->
        <div class="ticker-bar" id="message-ticker">
            <i>Waiting for messages...</i>
        </div>

        <div class="bottom-bar">
            <span class="live-transcript" id="live-transcript"></span>
            <button class="mic-btn" id="mic-btn" disabled>
                <div class="mic-content">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                    <span id="ptt-label">HOLD TO TALK</span>
                </div>
            </button>
        </div>

        <!-- BOTTOM NAV TABS -->
        <div class="nav-tabs">
            <div class="nav-tab active" data-target="tab-cards">Cards</div>
            <div class="nav-tab" data-target="tab-dashboard">Dashboard</div>
            <div class="nav-tab" data-target="tab-map">Map</div>
            <div class="nav-tab" data-target="tab-dispatch">Dispatch</div>
    </div>

    <script src="/static/registration.js"></script>
    <script src="/static/audio.js"></script>
    <script>
class VoiceCaptureManager {
    constructor(onInterim, onDone) {
        this.onInterim = onInterim;
        this.onDone = onDone;
        this.isRecording = false;
        this.mediaRecorder = null;
        this.audioChunks = [];
        this.stream = null;
        this.recognition = null;
        this.finalTranscript = '';
        this._initSpeech();
    }
    _initSpeech() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return;
        this.recognition = new SR();
        this.recognition.continuous = true;
        this.recognition.interimResults = true;
        this.recognition.lang = 'en-US';
        this.recognition.onresult = (event) => {
            let interim = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) this.finalTranscript += event.results[i][0].transcript;
                else interim += event.results[i][0].transcript;
            }
            if (this.onInterim) this.onInterim(this.finalTranscript + interim);
        };
        this.recognition.onerror = (e) => console.warn("SpeechRec error:", e.error);
    }
    _getSupportedMimeType() {
        const types = ['audio/mp4','audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg'];
        for (const t of types) { if (MediaRecorder.isTypeSupported(t)) return t; }
        return '';
    }
    async startRecording() {
        if (this.isRecording) return;
        this.isRecording = true;
        this.finalTranscript = '';
        this.audioChunks = [];
        try {
            this.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mimeType = this._getSupportedMimeType();
            this.mediaRecorder = new MediaRecorder(this.stream, mimeType ? { mimeType } : {});
            this.mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) this.audioChunks.push(e.data); };
            this.mediaRecorder.onstop = () => {
                const blob = new Blob(this.audioChunks, { type: this.mediaRecorder.mimeType });
                this._finish(blob);
            };
            this.mediaRecorder.start();
            if (this.recognition) { try { this.recognition.start(); } catch(e) {} }
        } catch (err) {
            console.error("Mic error:", err.name, err.message);
            this.isRecording = false;
        }
    }
    stopRecording() {
        if (!this.isRecording) return;
        this.isRecording = false;
        if (this.recognition) this.recognition.stop();
        if (this.mediaRecorder && this.mediaRecorder.state !== 'inactive') this.mediaRecorder.stop();
        if (this.stream) this.stream.getTracks().forEach(t => t.stop());
    }
    _finish(audioBlob) {
        const formData = new FormData();
        const ext = audioBlob.type.includes('mp4') ? 'mp4' : audioBlob.type.includes('ogg') ? 'ogg' : 'webm';
        formData.append("audio_blob", audioBlob, "recording." + ext);
        formData.append("transcript", this.finalTranscript.trim() || "[no transcript]");
        if (this.onDone) this.onDone(formData);
    }
}
console.log('VoiceCaptureManager loaded inline');
</script>
    <script src="/static/ws.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
